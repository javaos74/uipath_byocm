load_module modules/ngx_http_js_module.so;

events {}

http {
    js_import transform from /etc/nginx/transform.js;

    server {
        listen 80;
        server_name _;

        # 클라이언트 요청을 njs에서 받아 body 변환 후 subrequest로 전달
        location /v1/ {
            js_content transform.proxy;
        }

        # 실제 프록시 (njs subrequest 전용, 외부 직접 접근 불가)
        location /v1_upstream/ {
            internal;

            proxy_pass https://clovastudio.stream.ntruss.com/v1/openai/;

            proxy_ssl_server_name on;
            proxy_set_header Host clovastudio.stream.ntruss.com;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Authorization $http_authorization;

            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_buffering off;
            proxy_cache off;

            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
        }
    }
}
